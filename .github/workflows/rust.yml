name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@master
      with:
        toolchain: 1.94.0
        components: rustfmt, clippy
    - name: Clippy
      run: cargo clippy --workspace --all-targets -- -D warnings
    - name: Build
      run: cargo build --workspace --verbose
    - name: Run tests
      run: cargo test --workspace --verbose
    - name: Test feature-gated code
      run: |
        cargo test -p asyn-rs --features epics --verbose
        cargo test -p ad-core-rs --features ioc --verbose
        cargo test -p ad-plugins-rs --features ioc --verbose
